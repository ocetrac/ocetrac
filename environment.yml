name: ocetrac
channels:
  - conda-forge
dependencies:
  # core
  - python=3.11
  - numpy
  - scipy
  - pandas
  - xarray
  - dask
  - cftime
  - netcdf4             # xarray NetCDF read/write
  - bottleneck          # fast xarray operations
  # image processing
  - scikit-image
  # visualisation
  - matplotlib
  - haversine
  # notebooks
  - jupyter
  - jupyterlab
  - ipykernel           # makes env available as a Jupyter kernel
  # testing
  - pytest